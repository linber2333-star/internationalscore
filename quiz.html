<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIFESCORE/TERM // 答题</title>
  <link rel="icon" type="image/png" href="images/favicon.ico"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body class="quiz-body">
  <!-- legacy hook (script may inject children) -->
  <div class="particles" id="particles" aria-hidden="true"></div>

  <!-- ═══════════════ HUD BAR ═══════════════ -->
  <header class="hud quiz-header" id="header">
    <div class="hud-row">

      <!-- LEFT: brand → home -->
      <a href="index.html" class="brand">
        <img class="brand-mark" src="images/favicon.ico" alt="LS"/>
        <span class="brand-text" data-i18n="quiz.title">人生评分测试</span>
      </a>

      <!-- CENTER: terminal progress bar -->
      <div class="quiz-header-progress">
        <span class="qhp-mode" id="quizModeBadge" style="display:none"></span>
        <div class="qhp-bar"><div class="qhp-fill" id="headerProgressFill"></div></div>
        <span class="qhp-label" id="headerProgressLabel">0%</span>
      </div>

      <!-- RIGHT: lang switcher -->
      <div class="hud-right">
        <div class="lang-switcher" id="langSwitcher">
          <span class="lang-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </span>
          <span class="lang-label" id="langLabel">简体中文</span>
          <span class="lang-arrow">▼</span>
          <div class="lang-dropdown" id="langDropdown">
            <div class="lang-option active" data-lang="zh-CN">简体中文</div>
            <div class="lang-option"        data-lang="zh-TW">繁體中文</div>
          </div>
        </div>
      </div>

    </div>
  </header>

  <!-- ═══════════════ QUIZ SHELL ═══════════════ -->
  <div class="quiz-shell">

    <!-- Page info (section + count) -->
    <div class="quiz-page-info">
      <div class="qpi-section">
        <span class="qpi-dot" id="sectionDot"></span>
        <span class="quiz-section-label" id="sectionLabel">基础信息</span>
      </div>
      <span class="quiz-count" id="progressCount">第 1 页 · 共 ? 页</span>
    </div>

    <!-- Cards rendered here by quiz.js -->
    <div id="cardArea"></div>

    <!-- Page-complete banner (toggled by quiz.js with .show) -->
    <div class="page-complete-banner" id="pageCompleteBanner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="quiz.pageComplete">本页全部完成，继续下一页</span>
    </div>

    <!-- Controls -->
    <div class="quiz-controls">
      <button class="btn-prev" id="btnPrev" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="quiz.prev">上一页</span>
      </button>
      <div class="quiz-page-dots" id="pageDots"></div>
      <button class="btn-next" id="btnNext">
        <span id="btnNextLabel" data-i18n="quiz.next">下一页</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <!-- Keyboard hint -->
    <div class="keyboard-hint" data-i18n="quiz.keyboardHint">选择后自动进入下一题 · 按方向键翻页</div>

  </div>

  <!-- ═══════════════ SCRIPTS (deep mode) ═══════════════ -->
  <script src="i18n.js"></script>
  <script src="questions.js"></script>
  <script>window.QUIZ_MODE='deep';</script>
  <!-- Scoring engine + helpers — must load before quiz.js so that
       LSIntegration.computeFromAnswers() is available in submitQuiz(). -->
  <script src="scoring-engine.js"></script>
  <script src="ls-fn-addiction.js"></script>
  <script src="ls-fn-bmi.js"></script>
  <script src="ls-fn-wealth.js"></script>
  <script src="ls-fn-resilience.js"></script>
  <script src="scoring-rules.js"></script>
  <script src="scoring-integration.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
