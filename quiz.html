<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>人生评分测试 — 答题</title>
  <link rel="icon" type="image/png" href="images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="quiz-body">
  <div class="particles" id="particles"></div>

  <header class="header quiz-header scrolled" id="header">
    <div class="header-inner">
      <div class="lang-switcher" id="langSwitcher">
        <div class="lang-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
        <span class="lang-label" id="langLabel">简体中文</span>
        <svg class="lang-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        <div class="lang-dropdown" id="langDropdown">
          <div class="lang-option" data-lang="en-US">English (US)</div>
          <div class="lang-option" data-lang="es-US">Español (EE.UU.)</div>
          <div class="lang-option active" data-lang="zh-CN">简体中文</div>
          <div class="lang-option" data-lang="zh-TW">繁體中文</div>
        </div>
      </div>
      <div class="logo">
        <span class="logo-mark">LS</span>
        <span class="logo-text" data-i18n="quiz.title">人生评分测试</span>
      </div>
      <nav class="nav quiz-nav">
        <a href="index.html" class="nav-link quiz-home-link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span data-i18n="nav.home">首页</span>
        </a>
      </nav>
      <div class="quiz-header-progress">
        <span class="qhp-mode" id="quizModeBadge" style="display:none"></span>
        <div class="qhp-bar"><div class="qhp-fill" id="headerProgressFill"></div></div>
        <span class="qhp-label" id="headerProgressLabel">0%</span>
      </div>
    </div>
  </header>

  <div class="quiz-shell">
    <div class="quiz-page-info">
      <div class="qpi-section">
        <span class="qpi-dot" id="sectionDot"></span>
        <span class="quiz-section-label" id="sectionLabel">基础信息</span>
      </div>
      <span class="quiz-count" id="progressCount">第 1 页 · 共 ? 页</span>
    </div>
    <div id="cardArea"></div>
    <div class="page-complete-banner" id="pageCompleteBanner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="quiz.pageComplete">本页全部完成，继续下一页</span>
    </div>
    <div class="quiz-controls">
      <button class="btn-prev" id="btnPrev" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        <span data-i18n="quiz.prev">上一页</span>
      </button>
      <div class="quiz-page-dots" id="pageDots"></div>
      <button class="btn-next" id="btnNext">
        <span id="btnNextLabel" data-i18n="quiz.next">下一页</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="keyboard-hint" data-i18n="quiz.keyboardHint">选择后自动进入下一题 · 按方向键翻页</div>
  </div>

  <script src="i18n.js"></script>
  <script src="questions.js"></script>
  <script>window.QUIZ_MODE='deep';</script>
  <script src="quiz.js"></script>
</body>
</html>
